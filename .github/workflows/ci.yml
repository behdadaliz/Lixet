name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  python-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m compileall -q backup cli core repair services utils validators install.py main.py
      - run: python -B -m unittest discover -s tests

  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e ".[dev]"
      - run: python -m ruff format --check .
      - run: python -m ruff check .
      - run: python -m mypy
      - run: python -m coverage run -m pytest
      - run: python -m coverage report
      - run: python -m coverage xml
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml

  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ludeeus/action-shellcheck@master
        with:
          scandir: "."
          format: gcc
          severity: warning

  distribution-fixtures:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: debian:bookworm
            bootstrap: apt-get update && apt-get install --yes python3
          - image: ubuntu:24.04
            bootstrap: apt-get update && apt-get install --yes python3
          - image: fedora:42
            bootstrap: dnf install --assumeyes python3
    container:
      image: ${{ matrix.image }}
    steps:
      - uses: actions/checkout@v4
      - run: ${{ matrix.bootstrap }}
      - run: python3 -B -m unittest discover -s tests
      - run: python3 -B main.py --no-color services
